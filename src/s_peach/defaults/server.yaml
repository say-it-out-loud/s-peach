# s-peach Server Configuration
# All fields can be overridden via S_PEACH_ prefixed env vars.
# For nested fields, use double underscore (__) as the delimiter.
# Example: S_PEACH_LOG_LEVEL=debug, S_PEACH_SERVER__HOST=127.0.0.1
# Example: S_PEACH_KOKORO__SPEED=1.5, S_PEACH_KITTEN__SPEED=1.2, S_PEACH_LANGUAGE=fr
# ---
# Model weights are cached in ~/.cache/huggingface/hub/ (HuggingFace default).

# Server bind address and port
server:
  host: "0.0.0.0"
  port: 7777

# API key authentication — all endpoints except /health require X-API-Key header.
# Generated by `s-peach init`. Override via S_PEACH_API_KEY env var.
api_key: "your-secret-key"

# IP whitelist — only these CIDRs can access any endpoint
# Add 0.0.0.0/0 to allow from anywhere
ip_whitelist:
  - "127.0.0.1/32"   # localhost only
  - "192.168.0.0/16" # home/private networks
  - "172.16.0.0/12"  # private networks (incl. common Docker ranges)
  # - "10.0.0.0/8"     # private networks (AWS/VPC etc.)

# ---

# Which models to register at startup (kitten-mini, kitten-micro, kitten-nano, kokoro, chatterbox-turbo, chatterbox, chatterbox-multi)
enabled_models:
  # - "kitten-nano"          #  26 MB ram, Fastest
  - "kitten-micro"           #  43 MB ram, Sweet spot for low-RAM
  # - "kitten-mini"          #  78 MB ram, Good balance for CPU
  - "kokoro"                 # 339 MB ram, High quality, 9 languages
  # - "chatterbox"           # 3.0 GB ram, Highest quality, voice cloning, CFG/exaggeration controls
  # - "chatterbox-turbo"     # 3.8 GB ram, Highest quality, voice cloning, slightly faster
  # - "chatterbox-multi"     # 3.0 GB ram, Highest quality, multilingual, voice cloning (23 languages)

# ---

# Global default language (ISO 639-1 code)
# Kokoro supports:        en, gb, ja, zh, es, fr, hi, it, pt
# Chatterbox-multi adds:  ar, da, de, el, fi, he, ko, ms, nl, no, pl, ru, sv, sw, tr
# Models that don't support language switching (kitten) ignore this setting.
language: "en"

# Kokoro-82M model configuration
# Installed by default with uv sync
kokoro:
  speed: 1.0      # 0.1–5.0

# KittenTTS model configuration (shared across kitten-mini, kitten-micro, kitten-nano)
kitten:
  speed: 1.0      # 0.1–5.0

# Chatterbox Turbo (350M) — high-quality voice cloning with paralinguistic tags
# Supports [laugh], [chuckle], [cough], [sigh], [gasp], [groan] in text
chatterbox:
  # sorry, no speed here
  device: "cpu"                # cpu normally, cuda if nvidia, or mps if apple

# ---

# Voice name → native ID mapping per model
# KittenTTS variants share the same 8 voices (identical across model sizes)
voices:
  kitten:
    Rosie : "Rosie"
    Bruno : "Bruno"
    Luna  : "Luna"
    Jasper: "Jasper"
    Hugo  : "Hugo"
    Bella : "Bella"
    Leo   : "Leo"
    Kiki  : "Kiki"
  # ---
  # Chatterbox — shared voice map for chatterbox-turbo, chatterbox, and chatterbox-multi.
  # Add custom voices by placing WAV files in the voices/ directory and mapping them here.
  # native_id is empty string for default voice, or path to reference audio clip.
  chatterbox:
    Default: ""
    Bea: "voices/bea_amused.wav"
    # Example: "voices/speaker.wav|flac|mp3"
  # ---
  # Optional per-variant overrides (uncomment to diverge from shared chatterbox map):
  # chatterbox-turbo:
  #   MyVoice: "voices/my_voice.wav"
  # chatterbox-multi:
  #   MyVoice: "voices/my_voice.wav"
  # ---
  # Kokoro-82M — 54 voices across 9 languages
  # Pipelines are cached per language — switching languages is seamless.
  kokoro:
    # American English (20)
    Heart:      "af_heart"
    Alloy:      "af_alloy"
    Aoede:      "af_aoede"
    Bella_US:   "af_bella"      # disambiguated from kitten's Bella
    Jessica:    "af_jessica"
    Kore:       "af_kore"
    Nicole:     "af_nicole"
    Nova:       "af_nova"
    River:      "af_river"
    Sarah:      "af_sarah"
    Sky:        "af_sky"
    Adam:       "am_adam"
    Echo:       "am_echo"
    Eric:       "am_eric"
    Fenrir:     "am_fenrir"
    Liam:       "am_liam"
    Michael:    "am_michael"
    Onyx:       "am_onyx"
    Puck:       "am_puck"
    Santa_US:   "am_santa"      # disambiguated (also in ES, BR)
    # British English (8)
    Alice:      "bf_alice"
    Emma:       "bf_emma"
    Isabella:   "bf_isabella"
    Lily:       "bf_lily"
    Daniel:     "bm_daniel"
    Fable:      "bm_fable"
    George:     "bm_george"
    Lewis:      "bm_lewis"
    # Japanese (5)
    Alpha_JP:   "jf_alpha"      # disambiguated (also in HI)
    Gongitsune: "jf_gongitsune"
    Nezumi:     "jf_nezumi"
    Tebukuro:   "jf_tebukuro"
    Kumo:       "jm_kumo"
    # Mandarin Chinese (8)
    Xiaobei:    "zf_xiaobei"
    Xiaoni:     "zf_xiaoni"
    Xiaoxiao:   "zf_xiaoxiao"
    Xiaoyi:     "zf_xiaoyi"
    Yunjian:    "zm_yunjian"
    Yunxi:      "zm_yunxi"
    Yunxia:     "zm_yunxia"
    Yunyang:    "zm_yunyang"
    # Spanish (3)
    Dora_ES:    "ef_dora"       # disambiguated (also in BR)
    Alex_ES:    "em_alex"       # disambiguated (also in BR)
    Santa_ES:   "em_santa"      # disambiguated (also in US, BR)
    # French (1)
    Siwis:      "ff_siwis"
    # Hindi (4)
    Alpha_HI:   "hf_alpha"     # disambiguated (also in JP)
    Beta:       "hf_beta"
    Omega:      "hm_omega"
    Psi:        "hm_psi"
    # Italian (2)
    Sara:       "if_sara"
    Nicola:     "im_nicola"
    # Brazilian Portuguese (3)
    Dora_BR:    "pf_dora"       # disambiguated (also in ES)
    Alex_BR:    "pm_alex"       # disambiguated (also in ES)
    Santa_BR:   "pm_santa"      # disambiguated (also in US, ES)

# ---

# Queue settings
queue_depth: 10        # Operational limit (max items in queue)
queue_max_depth: 50    # Validation ceiling (queue_depth cannot exceed this)
queue_ttl: 300         # Seconds before a queued item expires

# Max characters per /speak request
max_text_length: 1000

# TTS generation timeout in seconds
tts_timeout: 120

# Audio post-processing
fade_ms: 20          # fade in/out duration in milliseconds (reduce clicks)
silence_pad_ms: 500  # silence appended after each clip for DAC drain
trim_end_ms: 0       # trim this many ms from end of each clip (try 50 if chatterbox clicks)

# Logging
log_level: "info"
